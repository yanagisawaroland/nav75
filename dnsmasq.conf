# ============================================================
# dnsmasq 配置 - node75 (10.20.50.75)
# 统一 DNS 服务，供 A/B/C/D 环境及客户端使用
# ============================================================

# 监听端口和地址
port=53
listen-address=127.0.0.1,10.20.50.75

# 不读取 /etc/resolv.conf
no-resolv

# 上游 DNS（公网域名转发）
server=8.8.8.8
server=114.114.114.114

# 日志
log-queries
log-facility=/var/log/dnsmasq.log

# ============================================================
# 公共服务 node75
# ============================================================
address=/harbor.devops.local/10.20.50.75
address=/gitlab.devops.local/10.20.50.75
address=/harbor.devops.lan/10.20.50.75
address=/gitlab.devops.lan/10.20.50.75

# ============================================================
# A环境 devops71 (master71 10.20.50.71 ~ node74 10.20.50.74)
# VIP: 10.20.50.70（待配置 MetalLB）
# ============================================================
address=/myapp.devops.local/10.20.50.71
address=/myapp2.devops.local/10.20.50.71
address=/podinfo.devops.local/10.20.50.71
address=/goapp.devops.local/10.20.50.71
address=/tomcatapp.devops.local/10.20.50.71
address=/kibana.devops.local/10.20.50.71
address=/argocd.devops.local/10.20.50.71
address=/myapp.devops.lan/10.20.50.71
address=/myapp2.devops.lan/10.20.50.71
address=/podinfo.devops.lan/10.20.50.71
address=/goapp.devops.lan/10.20.50.71
address=/tomcatapp.devops.lan/10.20.50.71
address=/kibana.devops.lan/10.20.50.71
address=/argocd.devops.lan/10.20.50.71

# ============================================================
# B环境 devops51 (master51 10.20.50.51 / node52 10.20.50.52)
# VIP: 10.20.50.50 (MetalLB)  通配符 *.devops51.lan
# ============================================================
address=/harbor.devops51.lan/10.20.50.75
address=/gitlab.devops51.lan/10.20.50.75
address=/master51.devops51.lan/10.20.50.51
address=/node52.devops51.lan/10.20.50.52
address=/.devops51.lan/10.20.50.50

# ============================================================
# C环境 devops61 (master61 10.20.50.61 / node62 10.20.50.62)
# VIP: 10.20.50.60（待配置）  通配符 *.devops61.lan
# ============================================================
address=/harbor.devops61.lan/10.20.50.75
address=/gitlab.devops61.lan/10.20.50.75
address=/master61.devops61.lan/10.20.50.61
address=/node62.devops61.lan/10.20.50.62
address=/.devops61.lan/10.20.50.60

